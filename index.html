<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Pengadaan Langsung</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card glass-panel">
            <div class="login-header">
                <h1>E-Pengadaan Langsung</h1>
                <p class="text-muted">Silakan masuk ke akun Anda</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="loginType">Masuk Sebagai</label>
                    <select id="loginType" required>
                        <option value="user">Panitia / User</option>
                        <option value="penyedia">Vendor / Penyedia</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" placeholder="nama@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <span>Masuk Sistem</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
